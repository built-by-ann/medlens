services:
  backend:
    build:
      context: ../backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://medlens_user:medlens_password@postgres:5432/medlens_db
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: medlens_user
      POSTGRES_PASSWORD: medlens_password
      POSTGRES_DB: medlens_db
    ports:
      - "5432:5432"
    volumes:
      - medlens_postgres_data:/var/lib/postgresql/data

volumes:
  medlens_postgres_data: